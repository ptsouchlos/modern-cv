name: Format
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-format:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: typstyle
        uses: typstyle-rs/typstyle-action@main
        with:
          opts: --check
