name: Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Probe runner package cache
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: imagemagick cargo
          version: 1.0

      - name: Install oxipng from crates.io
        uses: baptiste0928/cargo-install@v3
        with:
          crate: oxipng

      - name: Install just from crates.io
        uses: baptiste0928/cargo-install@v3
        with:
          crate: just

      - name: Install tytanic
        uses: taiki-e/cache-cargo-install-action@v2
        with:
          tool: tytanic@0.3.3

      - name: Install fonts
        run: |
          chmod +x ./scripts/install-fontawesome
          chmod +x ./scripts/install-roboto
          chmod +x ./scripts/install-source-sans
          ./scripts/install-fontawesome
          ./scripts/install-roboto
          ./scripts/install-source-sans

      - name: Uninstall previous local install
        run: just uninstall

      - name: Show test runner fonts
        run: tt util fonts --use-system-fonts

      - name: Run test suite
        run: |
          just test

      - name: Archive diffs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: diffs-typst
          path: |
            tests/**/diff/*.png
            tests/**/out/*.png
            tests/**/ref/*.png
          retention-days: 5

      - name: Setup typst
        uses: typst-community/setup-typst@v5

      - name: Build docs
        run: just doc

      - name: Upload docs
        uses: actions/upload-artifact@v4
        with:
          name: manual
          path: docs/manual.pdf
